<title>コンディション</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@300;400;700&family=DM+Mono:wght@300;400&display=swap');
  :root{--bg:#0e1117;--surface:#161b25;--blue:#4a9eff;--blue-dim:#1e3a5f;--text:#e8edf5;--text-dim:#5a6478;--text-mid:#8a95a8;--green:#3dd68c;--amber:#f5a623;--radius:16px;--safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px);}
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;overscroll-behavior:none;}
  body{background:var(--bg);color:var(--text);font-family:'Zen Kaku Gothic New',sans-serif;min-height:100vh;min-height:-webkit-fill-available;display:flex;flex-direction:column;align-items:center;padding:calc(var(--safe-top) + 28px) 16px calc(var(--safe-bottom) + 40px);max-width:420px;margin:0 auto;overflow-y:auto;-webkit-overflow-scrolling:touch;}
  .date-header{width:100%;display:flex;flex-direction:column;align-items:center;margin-bottom:28px;gap:4px;}
  .date-day{font-family:'DM Mono',monospace;font-size:68px;font-weight:300;color:var(--text);line-height:1;letter-spacing:-4px;}
  .date-sub{font-family:'DM Mono',monospace;font-size:12px;color:var(--text-dim);letter-spacing:2px;text-transform:uppercase;}
  .metrics-container{width:100%;display:flex;flex-direction:column;gap:10px;margin-bottom:20px;}
  .metric-card{background:var(--surface);border-radius:var(--radius);padding:18px 20px;border:1px solid rgba(255,255,255,0.04);transition:border-color 0.2s;}
  .metric-card.active{border-color:rgba(74,158,255,0.25);}
  .metric-label{font-size:11px;font-weight:700;letter-spacing:2.5px;color:var(--text-dim);text-transform:uppercase;margin-bottom:12px;}
  .stars{display:flex;gap:6px;align-items:center;}
  .star{width:46px;height:46px;cursor:pointer;display:flex;align-items:center;justify-content:center;border-radius:10px;transition:transform 0.15s cubic-bezier(0.34,1.56,0.64,1);user-select:none;}
  .star:active{transform:scale(0.85)!important;}
  .star svg{width:30px;height:30px;}
  .star.filled svg{filter:drop-shadow(0 0 6px rgba(74,158,255,0.55));}
  .score-badge{margin-left:auto;font-family:'DM Mono',monospace;font-size:26px;font-weight:300;color:var(--blue);min-width:28px;text-align:right;opacity:0;transition:opacity 0.2s;}
  .score-badge.visible{opacity:1;}
  .memo-section{width:100%;margin-bottom:20px;}
  .memo-label{font-size:11px;font-weight:700;letter-spacing:2.5px;color:var(--text-dim);text-transform:uppercase;margin-bottom:10px;}
  textarea{width:100%;background:var(--surface);border:1px solid rgba(255,255,255,0.04);border-radius:var(--radius);color:var(--text);font-family:'Zen Kaku Gothic New',sans-serif;font-size:15px;padding:14px 16px;resize:none;outline:none;transition:border-color 0.2s;height:80px;line-height:1.6;-webkit-appearance:none;}
  textarea:focus{border-color:rgba(74,158,255,0.3);}
  textarea::placeholder{color:var(--text-dim);}
  .save-btn{width:100%;background:var(--blue);color:#fff;border:none;border-radius:var(--radius);padding:17px;font-family:'Zen Kaku Gothic New',sans-serif;font-size:15px;font-weight:700;letter-spacing:1px;cursor:pointer;transition:all 0.2s;-webkit-appearance:none;}
  .save-btn:active{transform:scale(0.97);opacity:0.9;}
  .save-btn.saved{background:var(--green);}
  .divider{width:100%;height:1px;background:rgba(255,255,255,0.05);margin:22px 0;}
  .tabs{width:100%;display:flex;gap:8px;margin-bottom:16px;}
  .tab{flex:1;background:var(--surface);border:1px solid rgba(255,255,255,0.04);border-radius:10px;padding:10px;font-family:'Zen Kaku Gothic New',sans-serif;font-size:12px;font-weight:700;letter-spacing:1px;color:var(--text-dim);cursor:pointer;text-align:center;transition:all 0.2s;}
  .tab.active{background:var(--blue-dim);border-color:rgba(74,158,255,0.3);color:var(--blue);}
  .history-section{width:100%;}
  .history-list{display:flex;flex-direction:column;gap:8px;}
  .history-item{background:var(--surface);border-radius:12px;padding:13px 16px;border:1px solid rgba(255,255,255,0.04);display:grid;grid-template-columns:auto 1fr 1fr 1fr;gap:0 14px;align-items:center;}
  .h-date{font-family:'DM Mono',monospace;font-size:11px;color:var(--text-dim);letter-spacing:0.5px;line-height:1.6;}
  .h-metric{display:flex;flex-direction:column;gap:3px;}
  .h-metric-label{font-size:9px;color:var(--text-dim);letter-spacing:1px;}
  .h-dots{display:flex;gap:3px;margin-top:1px;}
  .h-dot{width:6px;height:6px;border-radius:50%;background:var(--blue-dim);}
  .h-dot.on{background:var(--blue);}
  .h-memo{grid-column:1/-1;font-size:12px;color:var(--text-mid);margin-top:8px;line-height:1.5;padding-top:8px;border-top:1px solid rgba(255,255,255,0.04);}
  .empty-state{text-align:center;color:var(--text-dim);font-size:13px;padding:20px;}
  .chart-section{width:100%;}
  .chart-wrap{background:var(--surface);border-radius:var(--radius);padding:16px;border:1px solid rgba(255,255,255,0.04);margin-bottom:12px;}
  .chart-title{font-size:10px;font-weight:700;letter-spacing:2px;color:var(--text-dim);text-transform:uppercase;margin-bottom:12px;}
  .chart-range{display:flex;gap:6px;margin-bottom:12px;}
  .range-btn{background:#1e2535;border:1px solid rgba(255,255,255,0.06);border-radius:8px;padding:5px 10px;font-size:10px;color:var(--text-dim);cursor:pointer;font-family:'Zen Kaku Gothic New',sans-serif;letter-spacing:1px;}
  .range-btn.active{background:var(--blue-dim);border-color:rgba(74,158,255,0.3);color:var(--blue);}
  canvas{width:100%!important;height:110px!important;}
  .stats-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px;}
  .stat-card{background:var(--surface);border-radius:12px;padding:14px 10px;border:1px solid rgba(255,255,255,0.04);text-align:center;}
  .stat-label{font-size:9px;color:var(--text-dim);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px;}
  .stat-value{font-family:'DM Mono',monospace;font-size:22px;font-weight:300;color:var(--blue);}
  .stat-sub{font-size:9px;color:var(--text-dim);margin-top:2px;}
  .year-label{font-size:10px;font-weight:700;letter-spacing:2px;color:var(--text-dim);text-transform:uppercase;margin-bottom:10px;}
  .year-row{background:var(--surface);border-radius:12px;padding:12px 14px;border:1px solid rgba(255,255,255,0.04);margin-bottom:8px;}
  .year-row-head{font-family:'DM Mono',monospace;font-size:11px;color:var(--text-dim);margin-bottom:8px;}
  .year-stats{display:flex;gap:8px;}
  .year-stat{flex:1;text-align:center;}
  .year-stat-label{font-size:9px;color:var(--text-dim);letter-spacing:1px;}
  .year-stat-value{font-family:'DM Mono',monospace;font-size:18px;font-weight:300;color:var(--blue);margin-top:2px;}
  .toast{position:fixed;bottom:calc(var(--safe-bottom) + 24px);left:50%;transform:translateX(-50%) translateY(80px);background:var(--green);color:#0e1117;padding:12px 24px;border-radius:100px;font-size:13px;font-weight:700;letter-spacing:1px;transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1);pointer-events:none;white-space:nowrap;z-index:100;}
  .toast.show{transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div class="date-header">
  <div class="date-day" id="dayNum"></div>
  <div class="date-sub" id="dateStr"></div>
</div>
<div class="metrics-container">
  <div class="metric-card" id="card-0"><div class="metric-label">体調</div><div class="stars" id="stars-0"><span class="score-badge" id="badge-0"></span></div></div>
  <div class="metric-card" id="card-1"><div class="metric-label">やる気</div><div class="stars" id="stars-1"><span class="score-badge" id="badge-1"></span></div></div>
  <div class="metric-card" id="card-2"><div class="metric-label">目覚め</div><div class="stars" id="stars-2"><span class="score-badge" id="badge-2"></span></div></div>
</div>
<div class="memo-section">
  <div class="memo-label">メモ（任意）</div>
  <textarea id="memo" placeholder="今日の気づきや状況など…"></textarea>
</div>
<button class="save-btn" id="saveBtn" onclick="saveRecord()">記録する</button>
<div class="divider"></div>
<div class="tabs">
  <button class="tab active" onclick="showTab('history')">履歴</button>
  <button class="tab" onclick="showTab('chart')">グラフ</button>
  <button class="tab" onclick="showTab('stats')">統計</button>
</div>
<div id="tab-history" class="history-section"><div class="history-list" id="historyList"></div></div>
<div id="tab-chart" class="chart-section" style="display:none;">
  <div class="chart-range">
    <button class="range-btn active" onclick="setRange(30,this)">30日</button>
    <button class="range-btn" onclick="setRange(90,this)">3ヶ月</button>
    <button class="range-btn" onclick="setRange(365,this)">1年</button>
  </div>
  <div class="chart-wrap"><div class="chart-title">体調</div><canvas id="chart0"></canvas></div>
  <div class="chart-wrap"><div class="chart-title">やる気</div><canvas id="chart1"></canvas></div>
  <div class="chart-wrap"><div class="chart-title">目覚め</div><canvas id="chart2"></canvas></div>
</div>
<div id="tab-stats" class="chart-section" style="display:none;">
  <div class="stats-grid" id="statsGrid"></div>
  <div class="year-label">年別平均</div>
  <div id="yearSection"></div>
</div>
<div class="toast" id="toast"></div>

const scores=[0,0,0];
const labels=['体調','やる気','目覚め'];
const DAYS_JP=['日','月','火','水','木','金','土'];
let chartRange=30, charts=[null,null,null];

function initData(){
  if(!localStorage.getItem('migrated_v3')){
    const ex=JSON.parse(localStorage.getItem('conditionLog')||'[]');
    const exDates=new Set(ex.map(r=>r.date));
    const merged=[...ex];
    IMPORTED.forEach(r=>{if(!exDates.has(r.date))merged.push(r);});
    merged.sort((a,b)=>b.date.localeCompare(a.date));
    localStorage.setItem('conditionLog',JSON.stringify(merged));
    localStorage.setItem('migrated_v3','1');
  }
}
function getHistory(){return JSON.parse(localStorage.getItem('conditionLog')||'[]');}

function setDate(){
  const n=new Date();
  document.getElementById('dayNum').textContent=n.getDate();
  const y=n.getFullYear(),m=String(n.getMonth()+1).padStart(2,'0'),d=String(n.getDate()).padStart(2,'0');
  document.getElementById('dateStr').textContent=`${y}.${m}.${d}  ${DAYS_JP[n.getDay()]}曜日`;
}
function starSVG(f){const c=f?'#4a9eff':'#2a3347';return `<svg viewBox="0 0 24 24" fill="${c}" xmlns="http://www.w3.org/2000/svg"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>`;}

function buildStars(){
  for(let i=0;i<3;i++){
    const c=document.getElementById(`stars-${i}`),b=document.getElementById(`badge-${i}`);
    for(let s=1;s<=5;s++){const el=document.createElement('div');el.className='star';el.innerHTML=starSVG(false);el.addEventListener('click',()=>setScore(i,s));c.insertBefore(el,b);}
  }
}
function setScore(mi,v){
  scores[mi]=v;
  const c=document.getElementById(`stars-${mi}`),b=document.getElementById(`badge-${mi}`);
  c.querySelectorAll('.star').forEach((s,i)=>{const f=i<v;s.innerHTML=starSVG(f);s.classList.toggle('filled',f);if(f){s.style.transform='scale(1.1)';setTimeout(()=>{s.style.transform='';},180);}});
  b.textContent=v;b.classList.add('visible');
  document.getElementById(`card-${mi}`).classList.add('active');
}
function getDateKey(){const n=new Date();return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}-${String(n.getDate()).padStart(2,'0')}`;}

function saveRecord(){
  if(scores.every(s=>s===0)){showToast('星を選んでください','#f5a623');return;}
  const key=getDateKey(),memo=document.getElementById('memo').value.trim();
  let h=getHistory().filter(r=>r.date!==key);
  h.unshift({date:key,scores:[...scores],memo});
  if(h.length>4000)h=h.slice(0,4000);
  localStorage.setItem('conditionLog',JSON.stringify(h));
  const btn=document.getElementById('saveBtn');
  btn.textContent='記録完了 ✓';btn.classList.add('saved');
  setTimeout(()=>{btn.textContent='記録する';btn.classList.remove('saved');},2000);
  showToast('記録しました ✓');renderHistory();
}
function showToast(msg,color){const t=document.getElementById('toast');t.textContent=msg;t.style.background=color||'#3dd68c';t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}

function renderHistory(){
  const h=getHistory(),list=document.getElementById('historyList');
  if(!h.length){list.innerHTML='<div class="empty-state">まだ記録がありません</div>';return;}
  list.innerHTML=h.slice(0,60).map(r=>{
    const[y,m,d]=r.date.split('-'),dow=DAYS_JP[new Date(r.date).getDay()];
    const dots=sc=>Array.from({length:5},(_,i)=>`<div class="h-dot ${i<sc?'on':''}"></div>`).join('');
    const memo=r.memo?`<div class="h-memo">${r.memo}</div>`:'';
    return `<div class="history-item"><div class="h-date">${m}/${d}<br>${dow}</div>${labels.map((l,i)=>`<div class="h-metric"><span class="h-metric-label">${l}</span><div class="h-dots">${dots(r.scores[i])}</div></div>`).join('')}${memo}</div>`;
  }).join('');
}
function loadToday(){
  const key=getDateKey(),t=getHistory().find(r=>r.date===key);
  if(t){t.scores.forEach((s,i)=>{if(s>0)setScore(i,s);});document.getElementById('memo').value=t.memo||'';}
}
function showTab(name){
  ['history','chart','stats'].forEach(t=>{document.getElementById(`tab-${t}`).style.display=t===name?'block':'none';});
  document.querySelectorAll('.tab').forEach((el,i)=>{el.classList.toggle('active',['history','chart','stats'][i]===name);});
  if(name==='chart')buildCharts();
  if(name==='stats')buildStats();
}
function setRange(n,btn){
  chartRange=n;
  document.querySelectorAll('.range-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  charts.forEach(c=>{if(c)c.destroy();});charts=[null,null,null];
  buildCharts();
}
function buildCharts(){
  if(charts[0])return;
  const h=getHistory().filter(r=>r.scores.some(s=>s>0));
  const recent=h.slice(0,chartRange).reverse();
  const lbs=recent.map(r=>{const[y,m,d]=r.date.split('-');return `${m}/${d}`;});
  const colors=['#4a9eff','#3dd68c','#f5a623'];
  [0,1,2].forEach(i=>{
    const ctx=document.getElementById(`chart${i}`).getContext('2d');
    charts[i]=new Chart(ctx,{type:'line',data:{labels:lbs,datasets:[{data:recent.map(r=>r.scores[i]||null),borderColor:colors[i],backgroundColor:colors[i]+'22',borderWidth:2,pointRadius:chartRange>90?1:3,pointBackgroundColor:colors[i],tension:0.3,fill:true,spanGaps:true}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#5a6478',font:{size:9},maxRotation:0,maxTicksLimit:8},grid:{color:'rgba(255,255,255,0.04)'}},y:{min:0,max:5,ticks:{color:'#5a6478',font:{size:9},stepSize:1},grid:{color:'rgba(255,255,255,0.06)'}}}}});
  });
}
function buildStats(){
  const h=getHistory().filter(r=>r.scores.some(s=>s>0));
  if(!h.length)return;
  const avg=i=>(h.reduce((s,r)=>s+(r.scores[i]||0),0)/h.length).toFixed(1);
  const streak=()=>{let c=0;const t=getDateKey();for(let i=0;i<h.length;i++){if(i===0&&h[i].date!==t)break;c++;}return c;};
  document.getElementById('statsGrid').innerHTML=`
    ${labels.map((l,i)=>`<div class="stat-card"><div class="stat-label">${l}</div><div class="stat-value">${avg(i)}</div><div class="stat-sub">全期間平均</div></div>`).join('')}
    <div class="stat-card"><div class="stat-label">総記録</div><div class="stat-value">${h.length}</div><div class="stat-sub">日間</div></div>
    <div class="stat-card"><div class="stat-label">連続</div><div class="stat-value">${streak()}</div><div class="stat-sub">日間</div></div>
    <div class="stat-card"><div class="stat-label">開始</div><div class="stat-value" style="font-size:13px;margin-top:4px;">${h[h.length-1].date.slice(0,7)}</div><div class="stat-sub">から</div></div>
  `;
  const byYear={};
  h.forEach(r=>{const y=r.date.slice(0,4);if(!byYear[y])byYear[y]={count:0,sums:[0,0,0]};byYear[y].count++;r.scores.forEach((s,i)=>byYear[y].sums[i]+=s||0);});
  document.getElementById('yearSection').innerHTML=Object.keys(byYear).sort().reverse().map(y=>`
    <div class="year-row">
      <div class="year-row-head">${y}年（${byYear[y].count}日）</div>
      <div class="year-stats">${labels.map((l,i)=>`<div class="year-stat"><div class="year-stat-label">${l}</div><div class="year-stat-value">${(byYear[y].sums[i]/byYear[y].count).toFixed(1)}</div></div>`).join('')}</div>
    </div>`).join('');
}
initData();buildStars();setDate();loadToday();renderHistory();
</script>
